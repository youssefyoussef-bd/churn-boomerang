<script type="text/babel">
const { useState, useMemo, useEffect } = React;
const LEADS = window.LEADS;
const DISPOSITIONS = window.DISPOSITIONS;

function formatCurrency(n) {
  if (!n) return "$0";
  const num = parseFloat(n);
  if (isNaN(num)) return "$0";
  return "$" + Math.round(num).toLocaleString();
}

function formatPhone(p) {
  if (!p) return "";
  const digits = p.replace(/\D/g, "");
  if (digits.length === 11 && digits[0] === "1") {
    return "(" + digits.slice(1,4) + ") " + digits.slice(4,7) + "-" + digits.slice(7);
  }
  if (digits.length === 10) {
    return "(" + digits.slice(0,3) + ") " + digits.slice(3,6) + "-" + digits.slice(6);
  }
  return p;
}

function daysSince(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  const now = new Date();
  return Math.floor((now - d) / (1000 * 60 * 60 * 24));
}

function loadState() {
  try {
    const raw = localStorage.getItem("churn_dispositions_v2");
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveState(s) {
  try { localStorage.setItem("churn_dispositions_v2", JSON.stringify(s)); } catch {}
}

function App() {
  const [state, setState] = useState(loadState());
  const [search, setSearch] = useState("");

  useEffect(() => { saveState(state); }, [state]);
  useEffect(() => { localStorage.setItem("rep_name", repName); }, [repName]);

  const reasons = useMemo(() => {
    const counts = {};
    LEADS.forEach(l => {
      const r = l["Churn Reason Detailed"] || "Unknown";
      counts[r] = (counts[r] || 0) + 1;
    });
    return Object.entries(counts).sort((a,b) => b[1] - a[1]);
  }, []);

  const filtered = useMemo(() => {
    return LEADS.filter(l => {
      const id = l["Salesforce Account ID"];
      const disp = state[id]?.disposition || "none";
      if (statusFilter === "undialed" && disp !== "none") return false;
      if (statusFilter === "dialed" && disp === "none") return false;
      if (statusFilter !== "all" && statusFilter !== "undialed" && statusFilter !== "dialed" && disp !== statusFilter) return false;
      if (reasonFilter !== "all" && (l["Churn Reason Detailed"] || "Unknown") !== reasonFilter) return false;
      if (search) {
        const q = search.toLowerCase();
        const blob = [l["Account Name"], l["Contact Name"], l["Contact Email"], l["Phone"], l["Mobile Phone"], l["Competitor Host"], l["Churn Reason Detailed"]].join(" ").toLowerCase();
        if (!blob.includes(q)) return false;
      }
      return true;
    });
  }, [search, reasonFilter, statusFilter, state]);

    let total = LEADS.length, dialed = 0, connected = 0, opps = 0, totalGmv = 0, gmvAtRisk = 0;

      const id = l["Salesforce Account ID"];
      const disp = state[id]?.disposition || "none";
      const gmv = parseFloat(l["Pre-Churn GMV 28D"]) || 0;
      totalGmv += gmv;
      if (disp !== "none") dialed++;
      if (disp === "none") gmvAtRisk += gmv;
      if (disp === "connected" || disp === "opp") connected++;
      if (disp === "opp") opps++;
    });
    return { total, dialed, connected, opps, totalGmv, gmvAtRisk };
  }, [state]);

  const setDisposition = (id, disposition) => {
    setState(prev => ({ ...prev, [id]: { ...prev[id], disposition, dispositionTime: new Date().toISOString(), rep: repName }}));

  const setNotes = (id, notes) => {

  };

    navigator.clipboard.writeText(text);
    setCopyToast(label + " copied: " + text);
    setTimeout(() => setCopyToast(""), 1800);
  };

  const exportCsv = () => {
    const rows = [["Account ID","Account Name","Contact Name","Email","Phone","Mobile","GMV","Churn Reason","Disposition","Notes","Rep","Time"]];

      const id = l["Salesforce Account ID"];
      const s = state[id] || {};

    });

    const a = document.createElement("a");

            </div>
            <span className="text-stone-700">{stats.dialed}/{stats.total}</span>
            <span className="text-stone-400">·</span>
            <span className="text-blue-700">{stats.connected} connected</span>
            <span className="text-stone-400">·</span>
            <span className="text-emerald-700">{stats.opps} opps</span>
            <button onClick={exportCsv} className="ml-3 px-2 py-1 border border-stone-400 hover:bg-stone-900 hover:text-white text-xs">EXPORT CSV</button>
          </div>
        </div>
      </div>

      <div className="border-b border-stone-300 bg-white sticky top-0 z-30">
        <div className="max-w-7xl mx-auto px-6 py-3 flex flex-wrap gap-3 items-center">
          <div className="relative flex-1 min-w-64">
            <input
              type="text"
              placeholder="Search account, contact, phone, competitor..."
              value={search}
              onChange={e => setSearch(e.target.value)}
              className="w-full pl-3 pr-3 py-2 border border-stone-300 bg-stone-50 text-sm mono focus:outline-none focus:border-stone-700"
            />
          </div>
          <select
            value={statusFilter}
            onChange={e => setStatusFilter(e.target.value)}
            className="px-3 py-2 border border-stone-300 bg-stone-50 text-sm mono focus:outline-none focus:border-stone-700"
          >
            <option value="all">All Status</option>
            <option value="undialed">Untouched</option>
            <option value="dialed">Worked</option>
            {DISPOSITIONS.filter(d => d.id !== "none").map(d => (
              <option key={d.id} value={d.id}>{d.label}</option>
            ))}
          </select>
          <select
            value={reasonFilter}
            onChange={e => setReasonFilter(e.target.value)}
            className="px-3 py-2 border border-stone-300 bg-stone-50 text-sm mono focus:outline-none focus:border-stone-700 max-w-xs"
          >
            <option value="all">All Churn Reasons</option>
            {reasons.map(([r, c]) => (
              <option key={r} value={r}>{r} ({c})</option>
            ))}
          </select>
          <div className="text-sm text-stone-600 ml-auto mono">{filtered.length} of {LEADS.length}</div>
        </div>
      </div>

      <div className="max-w-7xl mx-auto px-6 py-6">
        <div className="border border-stone-300 bg-white">
          <div className="grid grid-cols-12 gap-3 px-4 py-2 border-b border-stone-300 bg-stone-100 text-xs uppercase tracking-wider text-stone-600 mono">
            <div className="col-span-4">Account</div>
            <div className="col-span-2">Phone</div>
            <div className="col-span-2">Churn Reason</div>
            <div className="col-span-1 text-right">GMV/mo</div>
            <div className="col-span-1">Days</div>
            <div className="col-span-2">Disposition</div>
          </div>

          {filtered.length === 0 && (
            <div className="px-4 py-12 text-center text-stone-500 text-sm">No accounts match your filters.</div>
          )}

          {filtered.map((lead, idx) => {
            const id = lead["Salesforce Account ID"];
            const disp = state[id]?.disposition || "none";
            const notes = state[id]?.notes || "";
            const isExpanded = expandedId === id;
            const accountName = lead["Account Name"] || "(Unknown)";
            const contactName = lead["Contact Name"] || "";
            const reason = lead["Churn Reason Detailed"] || "Unknown";
            const days = daysSince(lead["Churn Date"]);
            const isWorked = disp !== "none";

            return (
              <div key={id + idx} className={`border-b border-stone-200 last:border-b-0 ${isWorked ? "bg-stone-50" : ""}`}>
                <div className="grid grid-cols-12 gap-3 px-4 py-3 items-center text-sm hover:bg-stone-50">
                  <div className="col-span-4 min-w-0">
                    <a href={lead["Salesforce URL"]} target="_blank" rel="noopener noreferrer" className="font-medium text-stone-900 hover:text-blue-700 hover:underline truncate block">
                      {accountName} ↗
                    </a>
                    {contactName && (
                      <div className="text-xs text-stone-600 truncate mono">
                        {contactName}{lead["Contact Email"] ? ` · ${lead["Contact Email"]}` : ""}
                      </div>
                    )}
                  </div>

                  <div className="col-span-2 min-w-0 mono">
                    {lead["Mobile Phone"] && (
                      <button onClick={() => copyToClipboard(lead["Mobile Phone"], "Mobile")} className="text-xs text-stone-900 hover:text-blue-700 block w-full text-left">
                        M: {formatPhone(lead["Mobile Phone"])}
                      </button>
                    )}
                    {lead["Phone"] && (
                      <button onClick={() => copyToClipboard(lead["Phone"], "Phone")} className="text-xs text-stone-600 hover:text-blue-700 block w-full text-left">
                        P: {formatPhone(lead["Phone"])}
                      </button>
                    )}
                    {!lead["Phone"] && !lead["Mobile Phone"] && (
                      <span className="text-xs text-stone-400">No phone</span>
                    )}
                  </div>

                  <div className="col-span-2 min-w-0">
                    <div className="text-xs text-stone-800 truncate mono">{reason}</div>
                    {lead["Competitor Host"] && (
                      <div className="text-xs text-stone-500 truncate">→ {lead["Competitor Host"]}</div>
                    )}
                  </div>

                  <div className="col-span-1 text-right">
                    <div className="font-medium text-stone-900 mono">{formatCurrency(lead["Pre-Churn GMV 28D"])}</div>
                  </div>

                  <div className="col-span-1 text-stone-600 text-xs mono">
                    {days !== null ? `${days}d` : "—"}
                  </div>

                  <div className="col-span-2 flex items-center gap-2">
                    <select
                      value={disp}
                      onChange={e => setDisposition(id, e.target.value)}
                      className={`px-2 py-1 border text-xs flex-1 mono focus:outline-none ${
                        disp === "none" ? "border-stone-300 bg-white" :
                        disp === "opp" ? "border-emerald-400 bg-emerald-50 text-emerald-900" :
                        disp === "connected" ? "border-blue-400 bg-blue-50 text-blue-900" :
                        disp === "dnc" || disp === "disqualified" ? "border-rose-400 bg-rose-50 text-rose-900" :
                        "border-amber-400 bg-amber-50 text-amber-900"
                      }`}
                    >
                      {DISPOSITIONS.map(d => (
                        <option key={d.id} value={d.id}>{d.label}</option>
                      ))}
                    </select>
                    <button
                      onClick={() => setExpandedId(isExpanded ? null : id)}
                      className="text-stone-500 hover:text-stone-900 p-1 mono text-xs"
                    >
                      {isExpanded ? "▲" : "▼"}
                    </button>
                  </div>
                </div>

                {isExpanded && (
                  <div className="px-4 py-4 bg-stone-100 border-t border-stone-200 grid grid-cols-12 gap-4">
                    <div className="col-span-8 space-y-3">
                      {lead["Churn Reason"] && (
                        <div>
                          <div className="text-xs uppercase tracking-wider text-stone-500 mb-1 mono">Reason Category</div>
                          <div className="text-sm text-stone-800">{lead["Churn Reason"]} → {lead["Churn Reason Detailed"]}</div>
                        </div>
                      )}
                      {lead["Churn Request Notes"] && (
                        <div>
                          <div className="text-xs uppercase tracking-wider text-stone-500 mb-1 mono">CSM Notes at Churn</div>
                          <div className="text-sm text-stone-800 whitespace-pre-wrap">{lead["Churn Request Notes"]}</div>
                        </div>
                      )}
                      {lead["Churn Issues"] && (
                        <div>
                          <div className="text-xs uppercase tracking-wider text-stone-500 mb-1 mono">Issues Flagged</div>
                          <div className="text-sm text-stone-800 whitespace-pre-wrap">{lead["Churn Issues"]}</div>
                        </div>
                      )}
                      {(lead["Moving To OLO"] || lead["Moving To POS"]) && (
                        <div>
                          <div className="text-xs uppercase tracking-wider text-stone-500 mb-1 mono">Moving To</div>
                          <div className="text-sm text-stone-800">
                            {lead["Moving To OLO"] && <span>OLO: {lead["Moving To OLO"]}</span>}
                            {lead["Moving To OLO"] && lead["Moving To POS"] && <span> · </span>}
                            {lead["Moving To POS"] && <span>POS: {lead["Moving To POS"]}</span>}
                          </div>
                        </div>
                      )}
                      {lead["GBP Action % Change"] !== undefined && (
                        <div>
                          <div className="text-xs uppercase tracking-wider text-stone-500 mb-1 mono">GBP Activity Change</div>
                          <div className="text-sm text-stone-800 mono">{lead["GBP Action % Change"]}% change in daily GBP actions post-churn</div>
                        </div>
                      )}
                    </div>
                    <div className="col-span-4">
                      <div className="text-xs uppercase tracking-wider text-stone-500 mb-1 mono">Rep Notes</div>
                      <textarea
                        value={notes}
                        onChange={e => setNotes(id, e.target.value)}
                        placeholder="What happened on the call..."
                        className="w-full h-32 px-2 py-2 border border-stone-300 bg-white text-sm mono focus:outline-none focus:border-stone-700 resize-none"
                      />
                      <a href={lead["Salesforce URL"]} target="_blank" rel="noopener noreferrer" className="mt-2 w-full inline-flex items-center justify-center gap-2 px-3 py-2 bg-stone-900 text-stone-50 text-sm mono hover:bg-stone-700">
                        OPEN SFDC → DIAL ↗
                      </a>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        <div className="mt-4 text-xs text-stone-500 text-center mono">
          Dispositions saved to your browser. Use EXPORT CSV to share progress.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
